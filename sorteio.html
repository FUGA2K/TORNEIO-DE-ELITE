<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteio EASCC 2026</title>

<style>
body{
    margin:0;
    background:#082c17;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    text-align:center;
    padding:20px;
    background:#103f24;
}

h1,h2{
    color:#d4af37;
}

.wheels{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    padding:20px;
}

.wheel-card{
    background:#184d2c;
    padding:15px;
    border-radius:12px;
}

iframe{
    width:100%;
    height:700px;
    border:none;
    border-radius:12px;
}

@media(max-width:900px){
    .wheels{
        grid-template-columns:1fr;
    }

    iframe{
        height:600px;
    }
}
</style>

</head>
<body>

<header>
    <h1>🎱 Sorteio Oficial EASCC 2026</h1>
    <p>Sorteio dos Jogadores e das Posições</p>
</header>

<div class="wheels">

    <div class="wheel-card">
        <h2>👥 Sorteio dos Jogadores</h2>

        <iframe
            src="https://spinthewheel.io/pt/wheels/BIfdDl3EB3wR57ELtPOdcz0xJmU9MQ=="
            allowfullscreen>
        </iframe>

    </div>

    <div class="wheel-card">
        <h2>🔢 Sorteio das Posições</h2>

        <iframe
            src="https://spinthewheel.io/pt/wheels/47OWxc87Cv2fgLTy7X3ccz0xJmU9MQ=="
            allowfullscreen>
        </iframe>

    </div>

</div>

</body>
</html>
