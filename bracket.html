<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bracket EASCC 2026</title>

<link rel="stylesheet" href="style.css">

<style>

.bracket-container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:80px;
    padding:40px;
}

.round{
    display:flex;
    flex-direction:column;
    gap:80px;
}

.match{
    background:#184d2c;
    border:3px solid #d4af37;
    border-radius:15px;
    padding:20px;
    min-width:250px;
    text-align:center;
}

.match h3{
    color:#d4af37;
    margin-bottom:15px;
}

.player{
    font-size:24px;
    font-weight:bold;
    padding:10px;
}

.vs{
    color:#999;
    margin:10px 0;
}

.final-box{
    background:#225f37;
    border:4px solid gold;
}

.champion-box{
    background:#d4af37;
    color:black;
    border-radius:20px;
    padding:30px;
    text-align:center;
}

#campeao{
    font-size:48px;
    font-weight:bold;
}

@keyframes championGlow{

    0%{
        transform:scale(1);
        box-shadow:0 0 10px gold;
    }

    50%{
        transform:scale(1.05);
        box-shadow:0 0 40px gold;
    }

    100%{
        transform:scale(1);
        box-shadow:0 0 10px gold;
    }
}

.champion-box{
    animation:championGlow 2s infinite;
}

</style>

</head>

<body>

<header>

<a href="index.html" class="home-btn">
🏠 Menu Principal
</a>

<h1>🏆 Bracket Oficial EASCC</h1>

</header>

<section class="card">

<div class="bracket-container">

<div class="round">

<div class="match">

<h3>Meia-Final 1</h3>

<div id="mf1j1" class="player">...</div>

<div class="vs">VS</div>

<div id="mf1j2" class="player">...</div>

</div>

<div class="match">

<h3>Meia-Final 2</h3>

<div id="mf2j1" class="player">...</div>

<div class="vs">VS</div>

<div id="mf2j2" class="player">...</div>

</div>

</div>

<div class="round">

<div class="match final-box">

<h3>Grande Final</h3>

<div id="finalj1" class="player">...</div>

<div class="vs">VS</div>

<div id="finalj2" class="player">...</div>

</div>

</div>

<div class="round">

<div class="champion-box">

<h2>👑 CAMPEÃO</h2>

<div id="campeao">
A definir
</div>

</div>

</div>

</div>

</section>

<script src="bracket.js"></script>

</body>
</html>
